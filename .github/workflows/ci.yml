name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["3.1", "3.2", "3.3"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test

  conformance:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Fetch attago-spec
        uses: actions/checkout@v4
        with:
          repository: AttaGo/attago-spec
          path: attago-spec

      - name: Run conformance
        env:
          ATTAGO_BASE_URL: ${{ secrets.ATTAGO_DEV_BASE_URL }}
          ATTAGO_API_KEY: ${{ secrets.ATTAGO_DEV_API_KEY }}
          ATTAGO_SPEC_DIR: ./attago-spec
        run: bundle exec ruby -Ilib -Itest test/conformance/test_conformance.rb
